✅ Step 5 — Create GitLab CI File
Create .gitlab-ci.yml
stages:
  - build
  - deploy
variables:
  PROJECT_ID: "your-gcp-project-id"
  REGION: "asia-south1"
  SERVICE_NAME: "demoapp"
  REPOSITORY: "demo-repo"
before_script:
  - echo $GCLOUD_SERVICE_KEY | base64 -d > gcloud-key.json
  - gcloud auth activate-service-account --key-file gcloud-key.json
  - gcloud config set project $PROJECT_ID
  - gcloud auth configure-docker $REGION-docker.pkg.dev
build:
  stage: build
  image: google/cloud-sdk:latest
  script:
    - docker build -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$SERVICE_NAME .
    - docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$SERVICE_NAME
deploy:
  stage: deploy
  image: google/cloud-sdk:latest
  script:
    - gcloud run deploy $SERVICE_NAME \
        --image $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$SERVICE_NAME \
        --region $REGION \
        --platform managed \
        --allow-unauthenticated
 
